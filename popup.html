<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", sans-serif;
      background: #1a1a2e;
      color: #eee;
      width: 280px;
      padding: 20px;
    }

    h2 {
      text-align: center;
      font-size: 15px;
      margin-bottom: 18px;
      color: #a78bfa;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .speed-display {
      text-align: center;
      font-size: 42px;
      font-weight: bold;
      color: #fff;
      margin-bottom: 4px;
      line-height: 1;
    }

    .speed-display span {
      font-size: 18px;
      color: #a78bfa;
    }

    .slider-wrap {
      margin: 16px 0 12px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #a78bfa;
      cursor: pointer;
      height: 6px;
    }

    .range-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #888;
      margin-top: 4px;
    }

    /* ── Инпут со своими + / - кнопками ── */
    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .input-row label {
      font-size: 12px;
      color: #aaa;
      white-space: nowrap;
    }

    .num-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      background: #16213e;
      border: 1px solid #a78bfa55;
      border-radius: 6px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .num-wrap:focus-within {
      border-color: #a78bfa;
    }

    /* Прячем родные стрелки браузера */
    .num-wrap input[type="number"] {
      flex: 1;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 14px;
      padding: 6px 6px;
      outline: none;
      text-align: center;
      -moz-appearance: textfield;
    }

    .num-wrap input[type="number"]::-webkit-inner-spin-button,
    .num-wrap input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .num-btn {
      background: transparent;
      border: none;
      color: #a78bfa;
      font-size: 18px;
      line-height: 1;
      padding: 0 10px;
      cursor: pointer;
      user-select: none;
      transition: color 0.15s;
      height: 100%;
      display: flex;
      align-items: center;
    }

    .num-btn:hover {
      color: #fff;
    }

    /* ── Пресеты ── */
    .presets {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 14px;
    }

    .presets button {
      background: #16213e;
      border: 1px solid #a78bfa44;
      color: #ccc;
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
      min-width: 36px;
    }

    .presets button:hover,
    .presets button.active {
      background: #a78bfa;
      color: #fff;
      border-color: #a78bfa;
    }

    .status {
      text-align: center;
      font-size: 11px;
      color: #666;
      min-height: 16px;
      transition: color 0.3s;
    }

    .status.ok  { color: #4ade80; }
    .status.err { color: #f87171; }
  </style>
</head>
<body>

  <h2>
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="#a78bfa"
      viewBox="0 -960 960 960" style="vertical-align:middle;margin-right:6px;">
      <path d="M102.67-240v-480l350.66 240zm404.66 0v-480L858-480z"/>
    </svg>
    Video Speed
  </h2>

  <div class="speed-display" id="bigDisplay">1.0<span>x</span></div>

  <div class="slider-wrap">
    <input type="range" id="slider" min="0.1" max="16" step="0.1" value="1.0" />
    <div class="range-labels"><span>0.1x</span><span>4x</span><span>8x</span><span>16x</span></div>
  </div>

  <div class="input-row">
    <label>Скорость:</label>
    <div class="num-wrap">
      <button class="num-btn" id="btnMinus">−</button>
      <input type="number" id="numInput" min="0.1" max="16" step="0.1" value="1.0" />
      <button class="num-btn" id="btnPlus">+</button>
    </div>
  </div>

  <div class="presets">
    <button data-speed="0.5">0.5x</button>
    <button data-speed="1" class="active">1x</button>
    <button data-speed="1.5">1.5x</button>
    <button data-speed="2">2x</button>
    <button data-speed="3">3x</button>
    <button data-speed="4">4x</button>
    <button data-speed="6">6x</button>
    <button data-speed="8">8x</button>
    <button data-speed="10">10x</button>
    <button data-speed="12">12x</button>
    <button data-speed="16">16x</button>
  </div>

  <div class="status" id="status">—</div>

  <script src="popup.js"></script>
</body>
</html>
